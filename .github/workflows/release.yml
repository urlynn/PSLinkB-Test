  release:
    needs: [package-x86_64, package-aarch64, package-openwrt, package-windows, package-macos-aarch64, package-macos-x86_64]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: 'pkgs-*'
          path: /tmp/pkg
          merge-multiple: true
      - name: Create GitHub Release
        env:
          V: ${{ inputs.version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${V#v}"
          echo "=== All ===" && ls -la /tmp/pkg/ && echo "Count: $(ls /tmp/pkg/ | wc -l)"
          gh release delete "$TAG" --repo ${{ github.repository }} -y 2>&1 || true
          gh release create "$TAG" /tmp/pkg/* --repo ${{ github.repository }} --title "$TAG" --notes "pslinkb $TAG — CI built"
