name: Release

on:
  workflow_dispatch:
    inputs:
      run-id:
        description: 'Build workflow run ID'
        required: true
        type: string
      version:
        description: 'Version (e.g. 0.3.4)'
        required: true
        type: string
      deps-tag:
        description: 'Tag with pslinkb-build-deps.tar.zst'
        required: true
        type: string
        default: 'build-deps'

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: '*'
          path: /tmp/bins
          merge-multiple: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.run-id }}
      - name: Download deps (stream)
        run: |
          gh release download ${{ inputs.deps-tag }} --repo ${{ github.repository }} \
            -p 'pslinkb-build-deps.tar.zst' -D /tmp/ --clobber || echo "WARN: no deps"
          mkdir -p /tmp/deps
          [ -f /tmp/pslinkb-build-deps.tar.zst ] && tar --zstd -xf /tmp/pslinkb-build-deps.tar.zst -C /tmp/deps || true
      - name: Package all
        run: |
          V=${{ inputs.version }}
          rm -rf /tmp/out && mkdir -p /tmp/out
          for arch in x86_64 aarch64; do
            mkdir -p /tmp/pkg/usr/bin
            cp /tmp/bins/pslinkb-${arch}-openwrt /tmp/pkg/usr/bin/pslinkb
            chmod +x /tmp/pkg/usr/bin/pslinkb
            [ -f /tmp/deps/stream/${arch}-linux-musl/pslinkb-stream ] && cp /tmp/deps/stream/${arch}-linux-musl/pslinkb-stream /tmp/pkg/usr/bin/ || true
            (cd /tmp/pkg && tar czf /tmp/out/pslinkb-${V}-${arch}-openwrt.tar.gz usr/) && rm -rf /tmp/pkg
            mkdir -p /tmp/ipk/usr/bin /tmp/ipk/CONTROL
            cp /tmp/bins/pslinkb-${arch}-openwrt /tmp/ipk/usr/bin/pslinkb
            chmod +x /tmp/ipk/usr/bin/pslinkb
            [ -f /tmp/deps/stream/${arch}-linux-musl/pslinkb-stream ] && cp /tmp/deps/stream/${arch}-linux-musl/pslinkb-stream /tmp/ipk/usr/bin/ || true
            A=$([ "$arch" = "x86_64" ] && echo "x86_64" || echo "aarch64_generic")
            echo "Package: pslinkb" > /tmp/ipk/CONTROL/control
            echo "Version: $V-r0" >> /tmp/ipk/CONTROL/control
            echo "Architecture: $A" >> /tmp/ipk/CONTROL/control
            echo "Depends: libc,libpthread" >> /tmp/ipk/CONTROL/control
            (cd /tmp/ipk && tar czf /tmp/control.tar.gz -C CONTROL . && tar czf /tmp/data.tar.gz usr)
            echo "2.0" > /tmp/debian-binary
            (cd /tmp && tar czf /tmp/out/pslinkb-${V}-${arch}-opkg.ipk debian-binary control.tar.gz data.tar.gz)
            rm -rf /tmp/ipk
            mkdir -p /tmp/bun && cp /tmp/bins/pslinkb-${arch}-bundle /tmp/bun/pslinkb
            chmod +x /tmp/bun/pslinkb
            [ -f /tmp/deps/stream/${arch}-linux-musl/pslinkb-stream ] && cp /tmp/deps/stream/${arch}-linux-musl/pslinkb-stream /tmp/bun/ || true
            (cd /tmp/bun && tar czf /tmp/out/pslinkb-${V}-${arch}-bundle.tar.gz .) && rm -rf /tmp/bun
          done
          mkdir -p /tmp/win
          cp /tmp/bins/pslinkb-x86_64-windows.exe /tmp/win/pslinkb.exe
          [ -f /tmp/deps/stream/x86_64-windows/pslinkb-stream.exe ] && cp /tmp/deps/stream/x86_64-windows/pslinkb-stream.exe /tmp/win/ || true
          (cd /tmp/win && zip -qr /tmp/out/pslinkb-${V}-x86_64-windows.zip .)
          ls -la /tmp/out/
          echo "PACKAGED: $(ls /tmp/out/ | wc -l) files"
      - uses: actions/upload-artifact@v4
        with:
          name: packages
          path: /tmp/out/
          retention-days: 30

  verify-opkg-x86_64:
    needs: package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: packages
          path: /tmp/pkg
      - run: |
          curl -sL https://downloads.openwrt.org/releases/24.10.4/targets/x86/64/openwrt-24.10.4-x86-64-rootfs.tar.gz -o /tmp/rootfs.tar.gz
          mkdir -p /tmp/owrt && sudo tar xzf /tmp/rootfs.tar.gz -C /tmp/owrt --exclude='dev/*'
          mkdir -p /tmp/owrt/tmp /tmp/owrt/dev /tmp/owrt/var/lock
          ls /tmp/pkg/
          cp /tmp/pkg/pslinkb-*-x86_64-opkg.ipk /tmp/owrt/tmp/test.ipk
          sudo chroot /tmp/owrt /bin/opkg install /tmp/test.ipk --force-overwrite
          sudo chroot /tmp/owrt /usr/bin/pslinkb --version

  verify-opkg-aarch64:
    needs: package
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: packages
          path: /tmp/pkg
      - run: |
          curl -sL https://downloads.openwrt.org/releases/24.10.4/targets/armsr/armv8/openwrt-24.10.4-armsr-armv8-rootfs.tar.gz -o /tmp/rootfs.tar.gz
          mkdir -p /tmp/owrt && sudo tar xzf /tmp/rootfs.tar.gz -C /tmp/owrt --exclude='dev/*'
          mkdir -p /tmp/owrt/tmp /tmp/owrt/dev /tmp/owrt/var/lock
          cp /tmp/pkg/pslinkb-*-aarch64-opkg.ipk /tmp/owrt/tmp/test.ipk
          sudo chroot /tmp/owrt /bin/opkg install /tmp/test.ipk --force-overwrite
          sudo chroot /tmp/owrt /usr/bin/pslinkb --version

  verify-windows:
    needs: package
    runs-on: windows-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: packages
          path: pkg
      - run: |
          unzip -q pkg/pslinkb-*-windows.zip -d win
          win/pslinkb.exe --version

  release:
    needs: [verify-opkg-x86_64, verify-opkg-aarch64, verify-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: packages
          path: /tmp/pkg
      - name: Create Release and Upload
        run: |
          V=${{ inputs.version }}
          gh release create "v$V" /tmp/pkg/* \
            --repo ${{ github.repository }} \
            --title "v$V" \
            --notes "pslinkb v$V — auto-built and verified by CI" \
            --generate-notes
