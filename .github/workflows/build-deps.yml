name: Build Deps - FFI + stream

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Target'
        required: true
        type: choice
        options: [all, linux-x86_64, linux-aarch64, macos-aarch64, macos-x86_64, windows-x86_64, windows-aarch64]
        default: 'all'

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'

jobs:
  linux-x86_64:
    if: ${{ inputs.platform == 'all' || inputs.platform == 'linux-x86_64' }}
    runs-on: ubuntu-latest
    container: alpine:latest
    timeout-minutes: 10
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'
    steps:
      - run: apk add build-base git nasm
      - uses: actions/checkout@v4
      - name: Build FFmpeg + stream
        run: |
          cp src/stream_copy.c /tmp/
          git clone --branch n8.0 --depth 1 https://github.com/FFmpeg/FFmpeg.git /tmp/ffmpeg
          cd /tmp/ffmpeg
          ./configure \
            --prefix=/tmp/ffbuild \
            --enable-static --disable-shared \
            --disable-everything --enable-small --enable-ffmpeg \
            --enable-protocol=tcp,rtmp --enable-demuxer=flv --enable-muxer=flv \
            --enable-parser=h264 --enable-network \
            --disable-filters --disable-swscale --disable-bsfs \
            --disable-doc --disable-debug --disable-ffplay --disable-ffprobe \
            --disable-iconv --disable-lzma --disable-bzlib --disable-zlib --disable-runtime-cpudetect
          make -j$(nproc) && make install
          mkdir -p /tmp/ffbuild/bin
          gcc -O2 -static \
            /tmp/stream_copy.c \
            -I/tmp/ffbuild/include -L/tmp/ffbuild/lib \
            -lavformat -lavcodec -lavutil \
            -o /tmp/ffbuild/bin/pslinkb-stream
      - name: Verify - version + musl
        run: |
          BIN=/tmp/ffbuild/bin/pslinkb-stream
          "$BIN" --version
          file "$BIN" | grep -q 'statically linked' || { echo "ERROR: not static"; exit 1; }
          strings "$BIN" | grep -c GLIBC | grep -qx 0 || { echo "ERROR: linked against glibc"; exit 1; }
          echo "linux-x86_64 OK"
      - uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: /tmp/ffbuild/bin/pslinkb-stream

  linux-aarch64:
    if: ${{ inputs.platform == 'all' || inputs.platform == 'linux-aarch64' }}
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 10
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Build FFmpeg + stream (Alpine musl)
        run: |
          mkdir -p /tmp/ffbuild
          docker run --rm \
            -v "$GITHUB_WORKSPACE":/work -w /work \
            -v /tmp/ffbuild:/tmp/ffbuild \
            arm64v8/alpine:latest sh -c '
              apk add build-base git nasm
              cp /work/src/stream_copy.c /tmp/
              git clone --branch n8.0 --depth 1 https://github.com/FFmpeg/FFmpeg.git /tmp/ffmpeg
              cd /tmp/ffmpeg
              ./configure \
                --prefix=/tmp/ffbuild \
                --enable-static --disable-shared \
                --disable-everything --enable-small --enable-ffmpeg \
                --enable-protocol=tcp,rtmp --enable-demuxer=flv --enable-muxer=flv \
                --enable-parser=h264 --enable-network \
                --disable-filters --disable-swscale --disable-bsfs \
                --disable-doc --disable-debug --disable-ffplay --disable-ffprobe \
                --disable-iconv --disable-lzma --disable-bzlib --disable-zlib --disable-runtime-cpudetect
              make -j$(nproc) && make install
              mkdir -p /tmp/ffbuild/bin
              gcc -O2 -static \
                /tmp/stream_copy.c \
                -I/tmp/ffbuild/include -L/tmp/ffbuild/lib \
                -lavformat -lavcodec -lavutil \
                -o /tmp/ffbuild/bin/pslinkb-stream
            '
      - name: Verify - version + musl
        run: |
          BIN=/tmp/ffbuild/bin/pslinkb-stream
          "$BIN" --version
          file "$BIN" | grep -q 'statically linked' || { echo "ERROR: not static"; exit 1; }
          strings "$BIN" | grep -c GLIBC | grep -qx 0 || { echo "ERROR: linked against glibc"; exit 1; }
          echo "linux-aarch64 OK"
      - uses: actions/upload-artifact@v4
        with:
          name: linux-aarch64
          path: /tmp/ffbuild/bin/pslinkb-stream

  macos-aarch64:
    if: ${{ inputs.platform == 'all' || inputs.platform == 'macos-aarch64' }}
    runs-on: macos-26
    timeout-minutes: 5
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: brew install nasm pkg-config
      - name: Build FFmpeg
        run: |
          git clone --branch n8.0 --depth 1 https://github.com/FFmpeg/FFmpeg.git /tmp/ffmpeg
          cd /tmp/ffmpeg
          ./configure \
            --prefix=/tmp/ffbuild \
            --cc=clang --target-os=darwin --arch=aarch64 \
            --extra-cflags="-Oz -ffunction-sections -fdata-sections -fvisibility=hidden -mmacosx-version-min=11.0" \
            --extra-ldflags="-Wl,-dead_strip -Wl,-S -Wl,-x" \
            --enable-static --disable-shared \
            --disable-everything --enable-small \
            --enable-ffmpeg \
            --enable-protocol=tcp,rtmp --enable-demuxer=flv --enable-muxer=flv --enable-parser=h264 --enable-network \
            --disable-filters --disable-swscale --disable-bsfs --disable-doc --disable-debug --disable-ffplay --disable-ffprobe \
            --disable-iconv --disable-lzma --disable-bzlib --disable-zlib --disable-runtime-cpudetect
          make -j$(sysctl -n hw.ncpu) && make install
      - uses: actions/upload-artifact@v4
        with:
          name: macos-aarch64
          path: |
            /tmp/ffbuild/lib/
            /tmp/ffbuild/include/

  macos-x86_64:
    if: ${{ inputs.platform == 'all' || inputs.platform == 'macos-x86_64' }}
    runs-on: macos-26-intel
    timeout-minutes: 5
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: brew install nasm pkg-config
      - name: Build FFmpeg
        run: |
          git clone --branch n8.0 --depth 1 https://github.com/FFmpeg/FFmpeg.git /tmp/ffmpeg
          cd /tmp/ffmpeg
          ./configure \
            --prefix=/tmp/ffbuild \
            --cc=clang --target-os=darwin --arch=x86_64 \
            --extra-cflags="-Oz -ffunction-sections -fdata-sections -fvisibility=hidden" \
            --extra-ldflags="-Wl,-dead_strip -Wl,-S -Wl,-x" \
            --enable-static --disable-shared \
            --disable-everything --enable-small \
            --enable-ffmpeg \
            --enable-protocol=tcp,rtmp --enable-demuxer=flv --enable-muxer=flv --enable-parser=h264 --enable-network \
            --disable-filters --disable-swscale --disable-bsfs --disable-doc --disable-debug --disable-ffplay --disable-ffprobe \
            --disable-iconv --disable-lzma --disable-bzlib --disable-zlib --disable-runtime-cpudetect
          make -j$(sysctl -n hw.ncpu) && make install
      - uses: actions/upload-artifact@v4
        with:
          name: macos-x86_64
          path: |
            /tmp/ffbuild/lib/
            /tmp/ffbuild/include/

  windows-x86_64:
    if: ${{ inputs.platform == 'all' || inputs.platform == 'windows-x86_64' }}
    runs-on: windows-latest
    timeout-minutes: 10
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: >-
            git
            make
            diffutils
            mingw-w64-x86_64-binutils
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-nasm
      - name: Build FFmpeg + stream
        shell: msys2 {0}
        run: |
          cp "$GITHUB_WORKSPACE/src/stream_copy.c" /tmp/
          git clone --branch n8.0 --depth 1 https://github.com/FFmpeg/FFmpeg.git /tmp/ffmpeg
          cd /tmp/ffmpeg
          ./configure \
            --prefix=/tmp/ffbuild \
            --target-os=mingw32 --arch=x86_64 \
            --enable-static --disable-shared \
            --disable-everything --enable-small \
            --enable-ffmpeg \
            --enable-protocol=tcp,rtmp \
            --enable-demuxer=flv --enable-muxer=flv \
            --enable-parser=h264 \
            --enable-network \
            --disable-filters --disable-swscale --disable-bsfs \
            --disable-doc --disable-debug \
            --disable-ffplay --disable-ffprobe \
            --disable-iconv --disable-lzma --disable-bzlib --disable-zlib \
            --disable-runtime-cpudetect
          make -j4 && make install
          mkdir -p /tmp/ffbuild/bin
          export PKG_CONFIG_PATH=/tmp/ffbuild/lib/pkgconfig
          gcc -O2 -static \
            /tmp/stream_copy.c \
            $(pkg-config --cflags --libs --static libavformat libavcodec libavutil) \
            -o /tmp/ffbuild/bin/pslinkb-stream.exe
      - name: Copy to workspace + verify
        shell: bash
        run: |
          set -e
          SRC=$(find /d -name "pslinkb-stream.exe" -type f 2>/dev/null | head -1)
          if [ -z "$SRC" ]; then echo "ERROR: stream not found"; exit 1; fi
          mkdir -p /tmp/ffbuild/bin
          cp "$SRC" /tmp/ffbuild/bin/pslinkb-stream.exe
          /tmp/ffbuild/bin/pslinkb-stream.exe --version
          echo "windows-x86_64 OK"
      - uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: /tmp/ffbuild/bin/pslinkb-stream.exe

  windows-aarch64:
    if: ${{ inputs.platform == 'all' || inputs.platform == 'windows-aarch64' }}
    runs-on: windows-11-arm
    timeout-minutes: 10
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - name: Build FFmpeg + stream (native aarch64)
        run: |
          cp "$GITHUB_WORKSPACE/src/stream_copy.c" /tmp/
          git clone --branch n8.0 --depth 1 https://github.com/FFmpeg/FFmpeg.git /tmp/ffmpeg
          cd /tmp/ffmpeg
          ./configure \
            --prefix=/tmp/ffbuild \
            --target-os=mingw32 --arch=aarch64 \
            --extra-cflags="-Oz -static" --extra-ldflags="-static" \
            --enable-static --disable-shared \
            --disable-everything --enable-small \
            --enable-ffmpeg \
            --enable-protocol=tcp,rtmp --enable-demuxer=flv --enable-muxer=flv --enable-parser=h264 --enable-network \
            --disable-filters --disable-swscale --disable-bsfs --disable-doc --disable-debug --disable-ffplay --disable-ffprobe \
            --disable-iconv --disable-lzma --disable-bzlib --disable-zlib --disable-runtime-cpudetect
          make -j4 && make install
          mkdir -p /tmp/ffbuild/bin
          gcc -O2 -flto \
            -I/tmp/ffbuild/include -L/tmp/ffbuild/lib \
            /tmp/stream_copy.c \
            -lavformat -lavcodec -lavutil \
            -static -Wl,--gc-sections \
            -o /tmp/ffbuild/bin/pslinkb-stream.exe
      - name: Verify
        run: |
          /tmp/ffbuild/bin/pslinkb-stream.exe --version
          echo "windows-aarch64 OK"
      - uses: actions/upload-artifact@v4
        with:
          name: windows-aarch64
          path: /tmp/ffbuild/bin/pslinkb-stream.exe

  release-deps:
    needs: [linux-x86_64, linux-aarch64, macos-aarch64, macos-x86_64, windows-x86_64, windows-aarch64]
    if: ${{ inputs.platform == 'all' && !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: '*'
          path: /tmp/deps
      - name: Package + release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          OUT=/tmp/out; rm -rf "$OUT" && mkdir -p "$OUT"
          for arch in x86_64 aarch64; do
            SRC="/tmp/deps/linux-${arch}/pslinkb-stream"
            if [ -f "$SRC" ]; then
              mkdir -p "$OUT/stream/${arch}-linux-musl"
              cp "$SRC" "$OUT/stream/${arch}-linux-musl/pslinkb-stream"
              echo "  linux-${arch} ✓"
            fi
          done
          for arch in aarch64 x86_64; do
            if [ -d "/tmp/deps/macos-${arch}/lib" ]; then
              mkdir -p "$OUT/ffbuild/${arch}-macos"
              cp -r "/tmp/deps/macos-${arch}/lib" "$OUT/ffbuild/${arch}-macos/"
              cp -r "/tmp/deps/macos-${arch}/include" "$OUT/ffbuild/${arch}-macos/"
              echo "  macos-${arch} ffbuild ✓"
            fi
          done
          for arch in x86_64 aarch64; do
            SRC="/tmp/deps/windows-${arch}/pslinkb-stream.exe"
            if [ -f "$SRC" ]; then
              mkdir -p "$OUT/stream/${arch}-windows"
              cp "$SRC" "$OUT/stream/${arch}-windows/pslinkb-stream.exe"
              echo "  windows-${arch} ✓"
            fi
          done
          PKG="/tmp/pslinkb-build-deps.tar.gz"
          tar czf "$PKG" -C "$OUT" stream/ ffbuild/
          ls -lh "$PKG"
          TAG="build-deps"
          gh release delete "$TAG" --repo ${{ github.repository }} -y 2>&1 || true
          gh release create "$TAG" "$PKG" --repo ${{ github.repository }} --title "Build Dependencies" --notes "pslinkb-stream + FFmpeg static libs — CI built"
