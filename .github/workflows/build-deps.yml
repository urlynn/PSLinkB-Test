name: Build Deps (stream + ffmpeg)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Target (all = all 3 jobs)'
        required: true
        type: choice
        options: [all, macos-aarch64, macos-x86_64, windows-x86_64]
        default: 'all'

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'

jobs:
  macos-aarch64:
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'macos-aarch64' }}
    runs-on: macos-26
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: brew install nasm pkg-config
      - name: Build FFmpeg
        run: |
          git clone --branch n8.0 --depth 1 https://github.com/FFmpeg/FFmpeg.git /tmp/ffmpeg
          cd /tmp/ffmpeg
          ./configure \
            --prefix=/tmp/ffbuild \
            --cc=clang --target-os=darwin --arch=aarch64 \
            --extra-cflags="-Oz -ffunction-sections -fdata-sections -fvisibility=hidden -mmacosx-version-min=11.0" \
            --extra-ldflags="-Wl,-dead_strip -Wl,-S -Wl,-x" \
            --enable-static --disable-shared \
            --disable-everything --enable-small \
            --enable-ffmpeg \
            --enable-protocol=tcp,rtmp --enable-demuxer=flv --enable-muxer=flv --enable-parser=h264 --enable-network \
            --disable-filters --disable-swscale --disable-bsfs --disable-doc --disable-debug --disable-ffplay --disable-ffprobe \
            --disable-iconv --disable-lzma --disable-bzlib --disable-zlib --disable-runtime-cpudetect
          make -j$(sysctl -n hw.ncpu) && make install
      - uses: actions/upload-artifact@v4
        with:
          name: macos-aarch64
          path: |
            /tmp/ffbuild/lib/
            /tmp/ffbuild/include/

  macos-x86_64:
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'macos-x86_64' }}
    runs-on: macos-26-intel
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: brew install nasm pkg-config
      - name: Build FFmpeg
        run: |
          git clone --branch n8.0 --depth 1 https://github.com/FFmpeg/FFmpeg.git /tmp/ffmpeg
          cd /tmp/ffmpeg
          ./configure \
            --prefix=/tmp/ffbuild \
            --cc=clang --target-os=darwin --arch=x86_64 \
            --extra-cflags="-Oz -ffunction-sections -fdata-sections -fvisibility=hidden" \
            --extra-ldflags="-Wl,-dead_strip -Wl,-S -Wl,-x" \
            --enable-static --disable-shared \
            --disable-everything --enable-small \
            --enable-ffmpeg \
            --enable-protocol=tcp,rtmp --enable-demuxer=flv --enable-muxer=flv --enable-parser=h264 --enable-network \
            --disable-filters --disable-swscale --disable-bsfs --disable-doc --disable-debug --disable-ffplay --disable-ffprobe \
            --disable-iconv --disable-lzma --disable-bzlib --disable-zlib --disable-runtime-cpudetect
          make -j$(sysctl -n hw.ncpu) && make install
      - uses: actions/upload-artifact@v4
        with:
          name: macos-x86_64
          path: |
            /tmp/ffbuild/lib/
            /tmp/ffbuild/include/

  windows-x86_64:
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'windows-x86_64' }}
    runs-on: windows-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: >-
            git
            make
            diffutils
            mingw-w64-x86_64-binutils
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-nasm
      - name: Build FFmpeg + stream
        shell: msys2 {0}
        run: |
          cp "$GITHUB_WORKSPACE/src/stream_copy.c" /tmp/
          git clone --branch n8.0 --depth 1 https://github.com/FFmpeg/FFmpeg.git /tmp/ffmpeg
          cd /tmp/ffmpeg
          ./configure \
            --prefix=/tmp/ffbuild \
            --target-os=mingw32 \
            --arch=x86_64 \
            --enable-static --disable-shared \
            --disable-everything --enable-small \
            --enable-ffmpeg \
            --enable-protocol=tcp,rtmp \
            --enable-demuxer=flv --enable-muxer=flv \
            --enable-parser=h264 \
            --enable-network \
            --disable-filters --disable-swscale --disable-bsfs \
            --disable-doc --disable-debug \
            --disable-ffplay --disable-ffprobe \
            --disable-iconv --disable-lzma --disable-bzlib --disable-zlib \
            --disable-runtime-cpudetect
          make -j4 && make install
          mkdir -p /tmp/ffbuild/bin
          export PKG_CONFIG_PATH=/tmp/ffbuild/lib/pkgconfig
          gcc -O2 -static \
            -DSTREAM_VERSION=\"1.0\" \
            /tmp/stream_copy.c \
            $(pkg-config --cflags --libs --static libavformat libavcodec libavutil) \
            -o /tmp/ffbuild/bin/pslinkb-stream.exe
      - name: Copy output (MSYS2 /tmp → workspace)
        shell: bash
        run: |
          echo "MSYS2 tmp paths:"
          ls /tmp/ffbuild/bin/ 2>/dev/null || echo "  /tmp/ffbuild/bin: not found"
          ls /c/tmp/ffbuild/bin/ 2>/dev/null || echo "  /c/tmp/ffbuild/bin: not found"
          ls /d/a/_temp/msys64/tmp/ffbuild/bin/ 2>/dev/null || echo "  _temp/msys64/tmp: not found"
          find /d -name "pslinkb-stream.exe" -type f 2>/dev/null | head -3 || echo "  find: none found"
      - uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: /tmp/ffbuild/bin/pslinkb-stream.exe

  windows-aarch64:
    if: ${{ github.event.inputs.platform == 'windows-aarch64' }}
    runs-on: windows-11-arm
    timeout-minutes: 5
    defaults:
      run:
        shell: bash
    steps:
      - name: Build FFmpeg + stream (native aarch64)
        run: |
          git clone --branch n8.0 --depth 1 https://github.com/FFmpeg/FFmpeg.git /tmp/ffmpeg
          cd /tmp/ffmpeg
          ./configure \
            --prefix=/tmp/ffbuild \
            --target-os=mingw32 --arch=aarch64 \
            --extra-cflags="-Oz -static" --extra-ldflags="-static" \
            --enable-static --disable-shared \
            --disable-everything --enable-small \
            --enable-ffmpeg \
            --enable-protocol=tcp,rtmp --enable-demuxer=flv --enable-muxer=flv --enable-parser=h264 --enable-network \
            --disable-filters --disable-swscale --disable-bsfs --disable-doc --disable-debug --disable-ffplay --disable-ffprobe \
            --disable-iconv --disable-lzma --disable-bzlib --disable-zlib --disable-runtime-cpudetect
          make -j4 && make install
          mkdir -p /tmp/ffbuild/bin
          cp "$GITHUB_WORKSPACE/src/stream_copy.c" /tmp/
          gcc -O2 -flto \
            -DSTREAM_VERSION=\"1.0\" \
            -I/tmp/ffbuild/include -L/tmp/ffbuild/lib \
            /tmp/stream_copy.c \
            -lavformat -lavcodec -lavutil \
            -static -Wl,--gc-sections \
            -o /tmp/ffbuild/bin/pslinkb-stream.exe
      - uses: actions/upload-artifact@v4
        with:
          name: windows-aarch64
          path: /tmp/ffbuild/bin/pslinkb-stream.exe
