name: Package & Verify

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Stage 1: 打包所有格式 ──────────────────
  package:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x86_64, aarch64]
    outputs:
      release_id: ${{ steps.id.outputs.id }}
    steps:
      - name: Get release info
        id: id
        run: |
          echo "id=$(echo ${{ github.ref }} | cut -d/ -f3)" >> $GITHUB_OUTPUT

      - name: Download binaries
        run: |
          mkdir -p /tmp/out
          BIN=$(gh release download ${{ github.ref_name }} --repo ${{ github.repository }} -p "pslinkb-${{ matrix.arch }}-*" -D /tmp/out --clobber 2>&1 || true)
          STREAM=$(gh release download ${{ github.ref_name }} --repo ${{ github.repository }} -p "pslinkb-stream-${{ matrix.arch }}" -D /tmp/out --clobber 2>&1 || true)
          echo "=== binaries ===" && ls /tmp/out/

      - name: Package OpenWRT tar.gz
        run: |
          mkdir -p /tmp/pkg/usr/bin /tmp/pkg/etc/config /tmp/pkg/etc/init.d
          cp /tmp/out/pslinkb-${{ matrix.arch }}-openwrt /tmp/pkg/usr/bin/pslinkb
          cp /tmp/out/pslinkb-stream-${{ matrix.arch }} /tmp/pkg/usr/bin/pslinkb-stream
          cd /tmp/pkg && tar czf /tmp/pslinkb-${{ matrix.arch }}-openwrt.tar.gz usr/
          gh release upload ${{ github.ref_name }} /tmp/pslinkb-${{ matrix.arch }}-openwrt.tar.gz --repo ${{ github.repository }} --clobber

      - name: Package IPK (opkg)
        run: |
          mkdir -p /tmp/ipk/usr/bin /tmp/ipk/CONTROL
          cp /tmp/out/pslinkb-${{ matrix.arch }}-openwrt /tmp/ipk/usr/bin/pslinkb
          cp /tmp/out/pslinkb-stream-${{ matrix.arch }} /tmp/ipk/usr/bin/pslinkb-stream
          ARCH_CTL=${{ matrix.arch == 'x86_64' && 'x86_64' || 'aarch64_generic' }}
          echo "Package: pslinkb" > /tmp/ipk/CONTROL/control
          echo "Version: ${{ github.ref_name }}-r0" | sed 's/^v//' >> /tmp/ipk/CONTROL/control
          echo "Architecture: $ARCH_CTL" >> /tmp/ipk/CONTROL/control
          echo "Depends: libc,libpthread" >> /tmp/ipk/CONTROL/control
          cd /tmp/ipk && tar czf /tmp/control.tar.gz -C CONTROL . && tar czf /tmp/data.tar.gz usr
          echo "2.0" > /tmp/debian-binary
          cd /tmp && tar czf /tmp/pslinkb-${{ matrix.arch }}-opkg.ipk control.tar.gz data.tar.gz debian-binary
          gh release upload ${{ github.ref_name }} /tmp/pslinkb-${{ matrix.arch }}-opkg.ipk --repo ${{ github.repository }} --clobber

      - name: Package DEB
        run: |
          mkdir -p /tmp/deb/usr/bin /tmp/deb/DEBIAN
          cp /tmp/out/pslinkb-${{ matrix.arch }}-bundle /tmp/deb/usr/bin/pslinkb
          cp /tmp/out/pslinkb-stream-${{ matrix.arch }} /tmp/deb/usr/bin/pslinkb-stream
          DEB_ARCH=${{ matrix.arch == 'x86_64' && 'amd64' || 'arm64' }}
          VER=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          cat > /tmp/deb/DEBIAN/control <<DEBEOF
Package: pslinkb
Version: $VER
Architecture: $DEB_ARCH
Maintainer: urlynn
Section: net
Priority: optional
Description: PS5 to Bilibili live streaming bridge
DEBEOF
          cd /tmp/deb && tar czf /tmp/control.tar.gz -C DEBIAN . && tar czf /tmp/data.tar.gz usr
          echo "2.0" > /tmp/debian-binary && cd /tmp
          ar r /tmp/pslinkb-${{ matrix.arch }}-debian.deb debian-binary control.tar.gz data.tar.gz
          gh release upload ${{ github.ref_name }} /tmp/pslinkb-${{ matrix.arch }}-debian.deb --repo ${{ github.repository }} --clobber

      - name: Package Arch Linux
        run: |
          mkdir -p /tmp/arch/usr/bin
          cp /tmp/out/pslinkb-${{ matrix.arch }}-bundle /tmp/arch/usr/bin/pslinkb
          cp /tmp/out/pslinkb-stream-${{ matrix.arch }} /tmp/arch/usr/bin/pslinkb-stream
          VER=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          cat > /tmp/arch/.PKGINFO <<ARCHEOF
pkgname = pslinkb
pkgver = $VER-1
pkgdesc = PS5 to Bilibili live streaming bridge
arch = ${{ matrix.arch }}
ARCHEOF
          cd /tmp/arch && tar --zstd -cf /tmp/pslinkb-${{ matrix.arch }}-archlinux.pkg.tar.zst .PKGINFO usr/
          gh release upload ${{ github.ref_name }} /tmp/pslinkb-${{ matrix.arch }}-archlinux.pkg.tar.zst --repo ${{ github.repository }} --clobber

      - name: Package tar.gz (portable/bundle)
        run: |
          mkdir -p /tmp/portable
          cp /tmp/out/pslinkb-${{ matrix.arch }}-portable /tmp/portable/pslinkb
          cd /tmp/portable && tar czf /tmp/pslinkb-${{ matrix.arch }}-portable.tar.gz pslinkb
          gh release upload ${{ github.ref_name }} /tmp/pslinkb-${{ matrix.arch }}-portable.tar.gz --repo ${{ github.repository }} --clobber
          # bundle
          mkdir -p /tmp/bundle
          cp /tmp/out/pslinkb-${{ matrix.arch }}-bundle /tmp/bundle/pslinkb
          cp /tmp/out/pslinkb-stream-${{ matrix.arch }} /tmp/bundle/pslinkb-stream
          cd /tmp/bundle && tar czf /tmp/pslinkb-${{ matrix.arch }}-bundle.tar.gz pslinkb pslinkb-stream
          gh release upload ${{ github.ref_name }} /tmp/pslinkb-${{ matrix.arch }}-bundle.tar.gz --repo ${{ github.repository }} --clobber

  # ── Stage 2: 验证安装 + 运行 ──────────────
  verify-opkg:
    needs: package
    strategy:
      matrix:
        target:
          - arch: x86_64
            rootfs: https://downloads.openwrt.org/releases/24.10.4/targets/x86/64/openwrt-24.10.4-x86-64-rootfs.tar.gz
          - arch: aarch64
            rootfs: https://downloads.openwrt.org/releases/24.10.4/targets/armsr/armv8/openwrt-24.10.4-armsr-armv8-rootfs.tar.gz
    runs-on: ${{ startsWith(matrix.target.arch, 'aarch') && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    steps:
      - run: |
          curl -sL "${{ matrix.target.rootfs }}" -o /tmp/rootfs.tar.gz
          mkdir -p /tmp/owrt && sudo tar xzf /tmp/rootfs.tar.gz -C /tmp/owrt --exclude='dev/*'
          mkdir -p /tmp/owrt/tmp /tmp/owrt/dev /tmp/owrt/var/lock
          gh release download ${{ github.ref_name }} --repo ${{ github.repository }} -p "${{ matrix.target.arch }}-opkg.ipk" -D /tmp/owrt/tmp/ --clobber
          sudo chroot /tmp/owrt /bin/opkg install /tmp/pslinkb-${{ matrix.target.arch }}-opkg.ipk --force-overwrite
          sudo chroot /tmp/owrt /usr/bin/pslinkb --version

  verify-apk:
    needs: package
    strategy:
      matrix:
        target:
          - arch: x86_64
            rootfs: https://downloads.openwrt.org/snapshots/targets/x86/64/openwrt-x86-64-rootfs.tar.gz
          - arch: aarch64
            rootfs: https://downloads.openwrt.org/snapshots/targets/armsr/armv8/openwrt-armsr-armv8-rootfs.tar.gz
    runs-on: ${{ startsWith(matrix.target.arch, 'aarch') && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    steps:
      - run: |
          curl -sL "${{ matrix.target.rootfs }}" -o /tmp/rootfs.tar.gz
          mkdir -p /tmp/owrt && sudo tar xzf /tmp/rootfs.tar.gz -C /tmp/owrt --exclude='dev/*'
          mkdir -p /tmp/owrt/tmp /tmp/owrt/dev
          gh release download ${{ github.ref_name }} --repo ${{ github.repository }} -p "${{ matrix.target.arch }}-openwrt.tar.gz" -D /tmp/owrt/tmp/ --clobber
          sudo chroot /tmp/owrt /usr/bin/apk add --allow-untrusted /tmp/pslinkb-${{ matrix.target.arch }}-openwrt.tar.gz
          sudo chroot /tmp/owrt /usr/bin/pslinkb --version
