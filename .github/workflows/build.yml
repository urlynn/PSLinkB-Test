name: Build

on:
  workflow_dispatch:
    inputs:
      linux-x86_64:
        description: 'Build linux-x86_64 (openwrt + bundle + portable)'
        type: boolean
        required: false
        default: true
      linux-aarch64:
        description: 'Build linux-aarch64 (openwrt + bundle + portable)'
        type: boolean
        required: false
        default: true
      windows-x86_64:
        description: 'Build windows-x86_64'
        type: boolean
        required: false
        default: true
      macos-aarch64:
        description: 'Build macos-aarch64'
        type: boolean
        required: false
        default: true
      macos-x86_64:
        description: 'Build macos-x86_64'
        type: boolean
        required: false
        default: true

jobs:
  build-linux-x86_64:
    if: ${{ inputs.linux-x86_64 || github.event_name != 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup target add x86_64-unknown-linux-musl
      - run: sudo apt-get install -y musl-tools
      - name: Build openwrt
        run: cargo build --release --target x86_64-unknown-linux-musl --features openwrt,channel-mpsc,external-ffmpeg && cp target/x86_64-unknown-linux-musl/release/pslinkb /tmp/pslinkb-x86_64-openwrt
      - name: Build bundle
        run: cargo build --release --target x86_64-unknown-linux-musl --features cli,channel-mpsc,external-ffmpeg,dns-redirect && cp target/x86_64-unknown-linux-musl/release/pslinkb /tmp/pslinkb-x86_64-bundle
      - name: Build musl FFmpeg (for portable x86_64)
        run: |
          set -e
          git clone --branch n8.0 --depth 1 https://github.com/FFmpeg/FFmpeg.git /tmp/ffmpeg-src
          cd /tmp/ffmpeg-src
          CC=musl-gcc ./configure \
            --prefix=/tmp/ffmpeg-build \
            --target-os=linux --arch=x86_64 \
            --enable-static --disable-shared \
            --disable-everything --enable-small \
            --enable-ffmpeg \
            --enable-protocol=tcp,rtmp --enable-demuxer=flv --enable-muxer=flv --enable-parser=h264 --enable-network \
            --disable-filters --disable-swscale --disable-bsfs --disable-doc --disable-debug --disable-ffplay --disable-ffprobe \
            --disable-iconv --disable-lzma --disable-bzlib --disable-zlib --disable-runtime-cpudetect \
            --disable-x86asm
          make -j$(nproc) && make install
          rm -rf ffbuild/linux-x86_64 && mkdir -p ffbuild/linux-x86_64
          cp -a /tmp/ffmpeg-build/. ffbuild/linux-x86_64/
          echo "=== FFmpeg output ===" && ls -la ffbuild/linux-x86_64/lib/libav*.a
      - name: Build portable (ffi)
        run: cargo build --release --target x86_64-unknown-linux-musl --features cli,channel-mpsc,ffi-ffmpeg,dns-redirect && cp target/x86_64-unknown-linux-musl/release/pslinkb /tmp/pslinkb-x86_64-portable
      - uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: /tmp/pslinkb-x86_64-*
          retention-days: 30

  build-linux-aarch64:
    if: ${{ inputs.linux-aarch64 || github.event_name != 'workflow_dispatch' }}
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - run: rustup target add aarch64-unknown-linux-musl
      - run: sudo apt-get install -y musl-tools
      - name: Build openwrt
        run: cargo build --release --target aarch64-unknown-linux-musl --features openwrt,channel-mpsc,external-ffmpeg && cp target/aarch64-unknown-linux-musl/release/pslinkb /tmp/pslinkb-aarch64-openwrt
      - name: Build bundle
        run: cargo build --release --target aarch64-unknown-linux-musl --features cli,channel-mpsc,external-ffmpeg,dns-redirect && cp target/aarch64-unknown-linux-musl/release/pslinkb /tmp/pslinkb-aarch64-bundle
      - name: Build musl FFmpeg (for portable aarch64)
        run: |
          set -e
          git clone --branch n8.0 --depth 1 https://github.com/FFmpeg/FFmpeg.git /tmp/ffmpeg-src
          cd /tmp/ffmpeg-src
          CC=musl-gcc ./configure \
            --prefix=/tmp/ffmpeg-build \
            --target-os=linux --arch=aarch64 \
            --enable-static --disable-shared \
            --disable-everything --enable-small \
            --enable-ffmpeg \
            --enable-protocol=tcp,rtmp --enable-demuxer=flv --enable-muxer=flv --enable-parser=h264 --enable-network \
            --disable-filters --disable-swscale --disable-bsfs --disable-doc --disable-debug --disable-ffplay --disable-ffprobe \
            --disable-iconv --disable-lzma --disable-bzlib --disable-zlib --disable-runtime-cpudetect \
            --disable-asm
          make -j$(nproc) && make install
          rm -rf ffbuild/linux-aarch64 && mkdir -p ffbuild/linux-aarch64
          cp -a /tmp/ffmpeg-build/. ffbuild/linux-aarch64/
          echo "=== FFmpeg output ===" && ls -la ffbuild/linux-aarch64/lib/libav*.a
      - name: Build portable (ffi)
        run: cargo build --release --target aarch64-unknown-linux-musl --features cli,channel-mpsc,ffi-ffmpeg,dns-redirect && cp target/aarch64-unknown-linux-musl/release/pslinkb /tmp/pslinkb-aarch64-portable
      - uses: actions/upload-artifact@v4
        with:
          name: linux-aarch64
          path: /tmp/pslinkb-aarch64-*
          retention-days: 30

  build-windows-x86_64:
    if: ${{ inputs.windows-x86_64 || github.event_name != 'workflow_dispatch' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup target add x86_64-pc-windows-gnu
      - name: Build
        run: |
          cargo build --release --target x86_64-pc-windows-gnu --features cli,channel-broadcast,external-ffmpeg,dns-redirect
          cp target/x86_64-pc-windows-gnu/release/pslinkb.exe pslinkb-x86_64-windows.exe
      - uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: pslinkb-x86_64-windows.exe
          retention-days: 30

  build-macos-aarch64:
    if: ${{ inputs.macos-aarch64 || github.event_name != 'workflow_dispatch' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: brew install nasm pkg-config
      - name: Build FFmpeg (macOS aarch64)
        run: |
          set -e
          git clone --branch n8.0 --depth 1 https://github.com/FFmpeg/FFmpeg.git /tmp/ffmpeg
          cd /tmp/ffmpeg
          ./configure --prefix=/tmp/ffmpeg-build --cc=clang --target-os=darwin --arch=aarch64 \
            --enable-static --disable-shared --disable-everything --enable-small \
            --enable-ffmpeg --enable-protocol=tcp,rtmp --enable-demuxer=flv --enable-muxer=flv --enable-parser=h264 --enable-network \
            --disable-filters --disable-swscale --disable-bsfs --disable-doc --disable-debug --disable-ffplay --disable-ffprobe \
            --disable-iconv --disable-lzma --disable-bzlib --disable-zlib --disable-runtime-cpudetect
          make -j$(sysctl -n hw.ncpu) && make install
          rm -rf ffbuild/macos-aarch64 && mkdir -p ffbuild/macos-aarch64
          cp -a /tmp/ffmpeg-build/. ffbuild/macos-aarch64/
          echo "=== FFmpeg output ===" && ls -la ffbuild/macos-aarch64/lib/libav*.a
      - name: Build pslinkb (macOS aarch64)
        run: |
          cargo build --release --features "cli,channel-broadcast,ffi-ffmpeg,dns-redirect"
          cp target/release/pslinkb /tmp/pslinkb-aarch64-macos
      - uses: actions/upload-artifact@v4
        with:
          name: macos-aarch64
          path: /tmp/pslinkb-aarch64-macos
          retention-days: 30

  build-macos-x86_64:
    if: ${{ inputs.macos-x86_64 || github.event_name != 'workflow_dispatch' }}
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: brew install nasm pkg-config
      - name: Build FFmpeg (macOS x86_64)
        run: |
          set -e
          git clone --branch n8.0 --depth 1 https://github.com/FFmpeg/FFmpeg.git /tmp/ffmpeg
          cd /tmp/ffmpeg
          ./configure --prefix=/tmp/ffmpeg-build --cc=clang --target-os=darwin --arch=x86_64 \
            --enable-static --disable-shared --disable-everything --enable-small \
            --enable-ffmpeg --enable-protocol=tcp,rtmp --enable-demuxer=flv --enable-muxer=flv --enable-parser=h264 --enable-network \
            --disable-filters --disable-swscale --disable-bsfs --disable-doc --disable-debug --disable-ffplay --disable-ffprobe \
            --disable-iconv --disable-lzma --disable-bzlib --disable-zlib --disable-runtime-cpudetect
          make -j$(sysctl -n hw.ncpu) && make install
          rm -rf ffbuild/macos-x86_64 && mkdir -p ffbuild/macos-x86_64
          cp -a /tmp/ffmpeg-build/. ffbuild/macos-x86_64/
          echo "=== FFmpeg output ===" && ls -la ffbuild/macos-x86_64/lib/libav*.a
      - name: Build pslinkb (macOS x86_64)
        run: |
          cargo build --release --features "cli,channel-broadcast,ffi-ffmpeg,dns-redirect"
          cp target/release/pslinkb /tmp/pslinkb-x86_64-macos
      - uses: actions/upload-artifact@v4
        with:
          name: macos-x86_64
          path: /tmp/pslinkb-x86_64-macos
          retention-days: 30
